<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Classroom - Primaria</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .math-grid { display: grid; grid-template-columns: repeat(3, 4rem); gap: 1rem; justify-items: center; align-items: center; font-family: monospace; }
        .box { width: 3.8rem; height: 4.8rem; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; font-weight: 900; background: white; border: 3px solid #e2e8f0; transition: all 0.2s; }
        .box-active { border-color: #3b82f6; background: #eff6ff; box-shadow: 0 0 0 4px #dbeafe; }
        .carry-input { width: 2.5rem; height: 2.5rem; border: 2px dashed #cbd5e1; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .carry-active { border-color: #3b82f6; background: #eff6ff; }
    </style>
</head>
<body class="bg-orange-50 select-none overflow-hidden">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function PrimaryApp() {
            const problems = JSON.parse(localStorage.getItem('current_problems') || "[]");
            const type = localStorage.getItem('math_type'); 
            const title = localStorage.getItem('math_title') || "Práctica de Matemáticas";
            const apiKey = localStorage.getItem('openai_api_key');

            const [index, setIndex] = useState(0);
            const [status, setStatus] = useState(null); // 'win', 'fail', 'loading'
            const [digits, setDigits] = useState(['', '', '']); 
            const [carries, setCarries] = useState(['', '']);
            const [textAns, setTextAns] = useState(''); 
            const [focus, setFocus] = useState({ type: 'ans', pos: 2 }); 

            if (problems.length === 0) return <div className="p-10 text-center">Cargando...</div>;
            const current = problems[index];

            const markCorrect = () => {
                setStatus('win');
                setTimeout(() => {
                    if (index < problems.length - 1) {
                        setIndex(index + 1);
                        setDigits(['', '', '']);
                        setCarries(['', '']);
                        setTextAns('');
                        setFocus({ type: 'ans', pos: 2 });
                        setStatus(null);
                    } else {
                        alert("¡Increíble! Has terminado la ficha.");
                        window.location.href = 'index.html';
                    }
                }, 1000);
            };

            const markWrong = () => {
                setStatus('fail');
                setTimeout(() => setStatus(null), 1000);
            };

            const handleCheck = async () => {
                if (status === 'loading') return;
                
                // Logic for Column Addition (Numeric)
                if (type === 'column_math') {
                    const userVal = parseInt(digits.join(''), 10);
                    const correctVal = parseInt(current.answer, 10);
                    if (userVal === correctVal) return markCorrect();
                    return markWrong();
                }

                // AI Smart Logic for Clocks / Generic Text
                setStatus('loading');
                try {
                    const response = await fetch("https://api.openai.com/v1/chat/completions", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                        body: JSON.stringify({
                            model: "gpt-4o-mini",
                            messages: [{
                                role: "user",
                                content: `Eres un profesor. Compara estas respuestas:
                                Respuesta correcta esperada: "${current.answer}"
                                Respuesta del alumno: "${textAns}"
                                ¿Son la misma respuesta matemáticamente? (Ej: "3:15" y "tres y cuarto" es SI). 
                                Responde solo 'SI' o 'NO'.`
                            }]
                        })
                    });
                    const data = await response.json();
                    const result = data.choices[0].message.content.trim().toUpperCase();
                    if (result.includes('SI')) markCorrect();
                    else markWrong();
                } catch (e) {
                    // Manual fallback if AI fails
                    if (textAns.toLowerCase().trim() === current.answer.toLowerCase().trim()) markCorrect();
                    else markWrong();
                }
            };

            const handleKeypad = (val) => {
                if (val === 'C') {
                    if (focus.type === 'ans') {
                        let d = [...digits]; d[focus.pos] = ''; setDigits(d);
                    } else {
                        let c = [...carries]; c[focus.pos] = ''; setCarries(c);
                    }
                    return;
                }
                if (focus.type === 'ans') {
                    let d = [...digits]; d[focus.pos] = val; setDigits(d);
                    if (focus.pos > 0) setFocus({ type: 'ans', pos: focus.pos - 1 });
                } else {
                    let c = [...carries]; c[focus.pos] = val; setCarries(c);
                }
            };

            return (
                <div className="h-screen flex flex-col items-center justify-between p-4">
                    {/* Header */}
                    <div className="w-full flex justify-between p-2 font-bold text-orange-800">
                        <button onClick={() => window.location.href='index.html'}>✕ Salir</button>
                        <span className="text-center leading-tight">{title} <br/> <small className="text-orange-400">Problema {index + 1}/{problems.length}</small></span>
                        <div className="w-8"></div>
                    </div>

                    {/* Content Area */}
                    <div className="flex-1 flex flex-col items-center justify-center w-full">
                        {type === 'column_math' ? (
                            <div className="flex flex-col items-center">
                                {/* Carry Boxes */}
                                <div className="math-grid mb-4">
                                    <div onClick={()=>setFocus({type:'cry', pos:0})} className={`carry-input ${focus.type==='cry'&&focus.pos===0?'carry-active border-blue-500':''}`}>{carries[0]}</div>
                                    <div onClick={()=>setFocus({type:'cry', pos:1})} className={`carry-input ${focus.type==='cry'&&focus.pos===1?'carry-active border-blue-500':''}`}>{carries[1]}</div>
                                    <div></div>
                                </div>
                                {/* The Sum */}
                                <div className="math-grid text-5xl font-bold text-slate-800">
                                    {current.top.padStart(3, ' ').split('').map((n, i) => <span key={i}>{n}</span>)}
                                    <span className="text-orange-500">+</span>
                                    {current.bottom.padStart(2, ' ').split('').map((n, i) => <span key={i}>{n}</span>)}
                                </div>
                                <div className="w-64 h-1.5 bg-slate-800 my-6 rounded-full"></div>
                                {/* Answer Boxes */}
                                <div className="math-grid">
                                    {[0,1,2].map(i => (
                                        <div key={i} onClick={()=>setFocus({type:'ans', pos: i})} 
                                             className={`box ${focus.type==='ans'&&focus.pos===i?'box-active':''} ${status==='win'?'text-green-500':'text-blue-600'}`}>
                                            {digits[i]}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="w-full max-w-lg bg-white p-10 rounded-3xl shadow-xl text-center">
                                <p className="text-3xl font-bold mb-8 text-slate-800 leading-snug">{current.question}</p>
                                <input 
                                    className="w-full p-6 border-b-4 border-blue-100 text-3xl text-center outline-none focus:border-blue-500 transition-all bg-slate-50 rounded-t-xl"
                                    value={textAns}
                                    onChange={(e) => setTextAns(e.target.value)}
                                    placeholder="Tu respuesta..."
                                    autoFocus
                                />
                            </div>
                        )}
                        
                        {/* Feedback Area */}
                        <div className="h-16 mt-6 flex items-center">
                            {status === 'loading' && <div className="text-blue-500 font-bold animate-pulse">Pensando...</div>}
                            {status === 'win' && <div className="text-3xl font-black text-green-500 animate-bounce">¡MUY BIEN! 🌟</div>}
                            {status === 'fail' && <div className="text-2xl font-black text-red-500">Inténtalo de nuevo</div>}
                        </div>
                    </div>

                    {/* Interaction Bar */}
                    <div className="w-full max-w-sm pb-10">
                        {type === 'column_math' ? (
                            <div className="grid grid-cols-3 gap-3">
                                {[1,2,3,4,5,6,7,8,9,"C",0,"OK"].map(b => (
                                    <button key={b} onClick={() => b === "OK" ? handleCheck() : handleKeypad(b)} 
                                            className={`h-20 rounded-2xl font-black text-3xl shadow-lg active:scale-95 transition-all ${b==='OK'?'bg-orange-600 text-white':'bg-white text-slate-700'}`}>
                                        {b}
                                    </button>
                                ))}
                            </div>
                        ) : (
                            <button onClick={handleCheck} disabled={status === 'loading'}
                                    className="w-full py-8 bg-blue-600 text-white rounded-3xl font-black text-2xl shadow-2xl active:scale-95 transition-all disabled:bg-slate-300">
                                {status === 'loading' ? 'ESPERA...' : 'COMPROBAR RESPUESTA'}
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PrimaryApp />);
    </script>
</body>
</html>
