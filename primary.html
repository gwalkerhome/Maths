<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Primaria - Columnas Reales</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .math-container {
            display: grid;
            grid-template-columns: repeat(3, 4rem);
            gap: 0.5rem;
            justify-items: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        .digit-text { font-size: 3.5rem; font-weight: 800; color: #1e293b; line-height: 1; }
        .box {
            width: 3.8rem;
            height: 4.8rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 900;
            background: white;
            border: 3px solid #e2e8f0;
        }
        .box-active { border-color: #3b82f6; background: #eff6ff; box-shadow: 0 0 0 4px #dbeafe; }
        .carry-input {
            width: 2.8rem;
            height: 2.8rem;
            border: 2px dashed #cbd5e1;
            border-radius: 0.5rem;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-orange-50 select-none overflow-hidden">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function PrimaryApp() {
            const problems = JSON.parse(localStorage.getItem('current_problems') || "[]");
            const [index, setIndex] = useState(0);
            const [status, setStatus] = useState(null);
            const [digits, setDigits] = useState(['', '', '']); // [H, T, U]
            const [carries, setCarries] = useState(['', '']); 
            const [focus, setFocus] = useState({ type: 'ans', pos: 2 }); 

            if (problems.length === 0) return <div className="p-10 text-center text-xl">Error: No problems loaded.</div>;
            
            const current = problems[index];
            // Normalize numbers to 3 digits for the grid
            const topArr = current.top.toString().padStart(3, ' ').split('');
            const botArr = current.bottom.toString().padStart(3, ' ').split('');

            const handlePress = (val) => {
                if (status === 'win') return;

                if (val === 'C') {
                    if (focus.type === 'ans') {
                        let d = [...digits]; d[focus.pos] = ''; setDigits(d);
                    } else {
                        let c = [...carries]; c[focus.pos] = ''; setCarries(c);
                    }
                    return;
                }

                if (focus.type === 'ans') {
                    let d = [...digits]; d[focus.pos] = val; setDigits(d);
                    if (focus.pos > 0) setFocus({ type: 'ans', pos: focus.pos - 1 });
                } else {
                    let c = [...carries]; c[focus.pos] = val; setCarries(c);
                }
            };

            const check = () => {
                // Remove spaces and leading zeros for a clean math comparison
                const userNum = parseInt(digits.join(''));
                const correctNum = parseInt(current.answer);

                if (userNum === correctNum) {
                    setStatus('win');
                    setTimeout(() => {
                        if (index < problems.length - 1) {
                            setIndex(index + 1);
                            setDigits(['', '', '']);
                            setCarries(['', '']);
                            setFocus({ type: 'ans', pos: 2 });
                            setStatus(null);
                        } else {
                            alert("¡Terminado!"); window.location.href = 'index.html';
                        }
                    }, 1000);
                } else {
                    setStatus('fail');
                    setTimeout(() => setStatus(null), 800);
                }
            };

            return (
                <div className="h-screen flex flex-col items-center justify-between p-4">
                    <div className="w-full flex justify-between p-2 font-bold text-orange-800">
                        <button onClick={() => window.location.href='index.html'}>✕ Volver</button>
                        <span>Problema {index + 1} / {problems.length}</span>
                    </div>

                    <div className="flex flex-col items-center">
                        {/* Carry Row */}
                        <div className="math-container mb-4">
                            <div onClick={()=>setFocus({type:'cry', pos:0})} className={`carry-input ${focus.type==='cry'&&focus.pos===0?'border-blue-500 bg-blue-50':''}`}>{carries[0]}</div>
                            <div onClick={()=>setFocus({type:'cry', pos:1})} className={`carry-input ${focus.type==='cry'&&focus.pos===1?'border-blue-500 bg-blue-50':''}`}>{carries[1]}</div>
                            <div className="w-10"></div>
                        </div>

                        {/* Numbers Row 1 */}
                        <div className="math-container digit-text">
                            {topArr.map((n, i) => <span key={'t'+i}>{n}</span>)}
                        </div>

                        {/* Numbers Row 2 (with Plus sign) */}
                        <div className="math-container digit-text relative">
                            <span className="absolute -left-12 text-orange-500 font-light">+</span>
                            {botArr.map((n, i) => <span key={'b'+i}>{n}</span>)}
                        </div>

                        {/* Sum Line */}
                        <div className="w-64 h-1.5 bg-slate-800 my-4 rounded-full"></div>

                        {/* Answer Boxes */}
                        <div className="math-container">
                            {[0, 1, 2].map(i => (
                                <div 
                                    key={'ans'+i}
                                    onClick={() => setFocus({type:'ans', pos: i})}
                                    className={`box ${focus.type==='ans' && focus.pos === i ? 'box-active' : ''} ${status==='win' ? 'text-green-500' : 'text-blue-600'}`}
                                >
                                    {digits[i]}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="h-10">
                        {status === 'win' && <div className="text-2xl font-black text-green-500">🌟 ¡EXCELENTE!</div>}
                        {status === 'fail' && <div className="text-2xl font-black text-red-500 tracking-tight">Revisa el resultado...</div>}
                    </div>

                    <div className="grid grid-cols-3 gap-3 w-full max-w-sm pb-8">
                        {[1, 2, 3, 4, 5, 6, 7, 8, 9, "C", 0, "OK"].map(b => (
                            <button
                                key={b}
                                onClick={() => b === "OK" ? check() : handlePress(b)}
                                className={`h-16 rounded-2xl font-black text-3xl shadow-lg active:scale-90 transition-all ${b === "OK" ? "bg-orange-600 text-white" : "bg-white text-slate-700"}`}
                            >
                                {b}
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PrimaryApp />);
    </script>
</body>
</html>
