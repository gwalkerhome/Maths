<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math AI (OpenAI Vision)</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('openai_api_key') || '');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [problems, setProblems] = useState(null);
            const [view, setView] = useState('home');

            useEffect(() => {
                if (apiKey) localStorage.setItem('openai_api_key', apiKey);
            }, [apiKey]);

            const convertToBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result); // Keep the full data URL header
                    reader.onerror = reject;
                });
            };

            const processImage = async () => {
                if (!file || !apiKey) return alert("Please add your OpenAI Key and an Image (Screenshot).");
                setLoading(true);

                try {
                    const base64Image = await convertToBase64(file);
                    
                    const response = await fetch("https://api.openai.com/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: "gpt-4o-mini",
                            messages: [
                                {
                                    role: "user",
                                    content: [
                                        { type: "text", text: "Extract math problems from this image. Return ONLY a JSON array. Format: [{\"id\": 1, \"question\": \"text\", \"type\": \"numeric\", \"answer\": \"5\"}]." },
                                        {
                                            type: "image_url",
                                            image_url: { url: base64Image }
                                        }
                                    ]
                                }
                            ],
                            max_tokens: 1000
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || "OpenAI Connection failed");
                    }

                    const data = await response.json();
                    let rawText = data.choices[0].message.content;
                    
                    // Clean up the JSON
                    rawText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                    setProblems(JSON.parse(rawText));
                    
                } catch (error) {
                    console.error(error);
                    alert("Error: " + error.message);
                } finally {
                    setLoading(false);
                }
            };

            if (view === 'home') {
                return (
                    <div className="max-w-xl mx-auto mt-10 p-8 bg-white rounded-3xl shadow-2xl border-t-8 border-indigo-500">
                        <h1 className="text-4xl font-extrabold text-center text-slate-800 mb-2 tracking-tight">Math Classroom</h1>
                        <p className="text-center text-slate-400 mb-8 font-medium italic">OpenAI Vision Mode</p>
                        
                        <div className="space-y-6">
                            <input 
                                type="password" 
                                className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 transition-all text-center" 
                                placeholder="Paste OpenAI Key (sk-...)"
                                value={apiKey}
                                onChange={(e) => setApiKey(e.target.value)}
                            />
                            
                            <label className="flex flex-col items-center justify-center border-4 border-dashed border-slate-100 p-10 rounded-3xl cursor-pointer hover:bg-slate-50 transition-all">
                                <input type="file" accept="image/*" onChange={(e) => setFile(e.target.files[0])} className="hidden" />
                                <span className="text-5xl mb-4">📸</span>
                                <span className="font-bold text-slate-600 text-center">{file ? file.name : "Tap to Select Screenshot"}</span>
                                <span className="text-xs text-slate-400 mt-2 italic text-center">Take a screenshot of your PDF first</span>
                            </label>

                            <button 
                                onClick={processImage}
                                disabled={loading}
                                className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl active:scale-95 disabled:bg-slate-200 transition-all"
                            >
                                {loading ? "READING IMAGE..." : "GENERATE LESSON"}
                            </button>

                            {problems && (
                                <div className="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-slate-100">
                                    <button onClick={() => setView('primary')} className="p-5 bg-orange-500 text-white rounded-2xl font-bold shadow-lg uppercase">Ages 4-11</button>
                                    <button onClick={() => setView('secondary')} className="p-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg uppercase">Ages 11+</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-3xl mx-auto p-6 pb-20">
                    <button onClick={() => setView('home')} className="mb-8 font-black text-indigo-600 text-lg flex items-center">
                        <span className="mr-2 text-2xl">←</span> RESTART
                    </button>
                    <div className="space-y-6">
                        {problems.map((p, index) => (
                            <div key={index} className="bg-white p-8 rounded-3xl shadow-lg border-l-8 border-indigo-500 transition-all">
                                <h2 className="text-2xl font-bold text-slate-800 mb-4 tracking-tight">{p.question}</h2>
                                <div className="h-40 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center italic text-slate-400">
                                    <span className="text-3xl mb-2">✏️</span>
                                    Student workspace for {p.type}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
