<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Mates AI</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [problems, setProblems] = useState(null);
            const [view, setView] = useState('home'); // 'home', 'primaria', 'eso'

            const saveKey = (e) => {
                const key = e.target.value;
                setApiKey(key);
                localStorage.setItem('gemini_api_key', key);
            };

            const handleFileUpload = (e) => {
                setFile(e.target.files[0]);
            };

            const convertToBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = (error) => reject(error);
                });
            };

            const processPDF = async () => {
                if (!file || !apiKey) return alert("Por favor, sube un PDF y añade tu API Key.");
                setLoading(true);

                try {
                    const base64Data = await convertToBase64(file);
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Analiza este PDF y extrae los problemas matemáticos. Devuelve un JSON puro (sin bloques de código markdown) con esta estructura: [{id: 1, question: 'texto', type: 'numeric|canvas', answer: '8'}]. Usa formato español (comas para decimales)." },
                                    { inline_data: { mime_type: "application/pdf", data: base64Data } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    const text = data.candidates[0].content.parts[0].text;
                    // Clean potential markdown code blocks
                    const cleanJson = text.replace(/```json|```/g, "");
                    setProblems(JSON.parse(cleanJson));
                    alert("¡Problemas cargados con éxito!");
                } catch (error) {
                    console.error(error);
                    alert("Error procesando el PDF. Revisa tu API Key.");
                } finally {
                    setLoading(false);
                }
            };

            if (view === 'home') {
                return (
                    <div className="max-w-2xl mx-auto p-8">
                        <header className="text-center mb-10">
                            <h1 className="text-4xl font-bold text-blue-600">Aula de Mates AI</h1>
                            <p className="text-slate-600">Convierte tus PDFs en ejercicios interactivos</p>
                        </header>

                        <div className="bg-white p-6 rounded-xl shadow-md space-y-6">
                            {/* API Key Section */}
                            <div>
                                <label className="block text-sm font-medium mb-1">Gemini API Key</label>
                                <input 
                                    type="password" 
                                    className="w-full p-2 border rounded" 
                                    placeholder="Pega tu clave aquí..."
                                    value={apiKey}
                                    onChange={saveKey}
                                />
                            </div>

                            {/* File Upload Section */}
                            <div className="border-2 border-dashed border-slate-300 p-10 text-center rounded-lg">
                                <input type="file" accept="application/pdf" onChange={handleFileUpload} className="hidden" id="pdf-upload" />
                                <label htmlFor="pdf-upload" className="cursor-pointer text-blue-500 font-semibold">
                                    {file ? file.name : "Seleccionar PDF de problemas"}
                                </label>
                            </div>

                            <button 
                                onClick={processPDF}
                                disabled={loading}
                                className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 disabled:bg-slate-400"
                            >
                                {loading ? "Procesando con IA..." : "Analizar Worksheet"}
                            </button>

                            {problems && (
                                <div className="grid grid-cols-2 gap-4 pt-4 border-t">
                                    <button onClick={() => setView('primaria')} className="p-4 bg-orange-100 text-orange-700 rounded-lg hover:bg-orange-200 font-bold">
                                        Modo Infantil (4-11 años)
                                    </button>
                                    <button onClick={() => setView('eso')} className="p-4 bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200 font-bold">
                                        Modo ESO (12+ años)
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-8">
                    <button onClick={() => setView('home')} className="mb-4 text-blue-500">← Volver</button>
                    <h2 className="text-2xl font-bold mb-6">Modo: {view === 'primaria' ? 'Primaria' : 'Secundaria'}</h2>
                    <div className="space-y-4">
                        {problems.map(p => (
                            <div key={p.id} className="bg-white p-4 rounded shadow">
                                <p className="font-semibold">{p.question}</p>
                                <div className="mt-2 h-20 bg-slate-50 border border-dashed rounded flex items-center justify-center text-slate-400">
                                    [Área de respuesta: {p.type}]
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
