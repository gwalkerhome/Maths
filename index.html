<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Launcher - Teacher Mode</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function Launcher() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('openai_api_key') || '');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);

            const processAsTeacher = async (targetPage) => {
                if (!file || !apiKey) return alert("Please add Key and Screenshot.");
                setLoading(true);
                
                try {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = async () => {
                        const base64Image = reader.result;
                        
                        // YOUR LOGIC: The Teacher Persona Prompt
                        const prompt = `
                            Actua como un profesor de primaria en España. 
                            1. Analiza esta imagen y determina el tipo de matemáticas (ej: sumas en columna, relojes, fracciones).
                            2. Crea 10 problemas nuevos con un nivel de dificultad idéntico para tus alumnos.
                            3. Clasifica el tipo como: 'column_math', 'clock', o 'generic'.
                            4. Devuelve los resultados exclusivamente en formato JSON con esta estructura:
                            {
                                "type": "column_math", 
                                "title": "Sumas con llevadas",
                                "problems": [
                                    {"top": "123", "bottom": "456", "answer": "579"},
                                    {"question": "What is 2+2?", "answer": "4"}
                                ]
                            }
                        `;

                        const response = await fetch("https://api.openai.com/v1/chat/completions", {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                            body: JSON.stringify({
                                model: "gpt-4o-mini",
                                messages: [{
                                    role: "user",
                                    content: [
                                        { type: "text", text: prompt },
                                        { type: "image_url", image_url: { url: base64Image } }
                                    ]
                                }],
                                response_format: { type: "json_object" }
                            })
                        });

                        const data = await response.json();
                        const content = JSON.parse(data.choices[0].message.content);
                        
                        localStorage.setItem('openai_api_key', apiKey);
                        localStorage.setItem('math_type', content.type);
                        localStorage.setItem('math_title', content.title);
                        localStorage.setItem('current_problems', JSON.stringify(content.problems));
                        
                        window.location.href = targetPage;
                    };
                } catch (e) { 
                    alert("Error: " + e.message); 
                    setLoading(false); 
                }
            };

            return (
                <div className="max-w-xl mx-auto mt-20 p-8 bg-white rounded-3xl shadow-xl border-t-8 border-indigo-600">
                    <h1 className="text-3xl font-black text-center mb-2">Math Classroom</h1>
                    <p className="text-center text-slate-400 mb-8 font-medium">Teacher Input Mode</p>
                    
                    <input type="password" border className="w-full p-4 bg-slate-50 rounded-xl mb-4 border" placeholder="OpenAI Key" value={apiKey} onChange={(e) => setApiKey(e.target.value)} />
                    <input type="file" accept="image/*" onChange={(e) => setFile(e.target.files[0])} className="mb-6 block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700" />
                    
                    <button 
                        onClick={() => processAsTeacher('primary.html')} 
                        disabled={loading} 
                        className="w-full p-6 bg-indigo-600 text-white rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-all"
                    >
                        {loading ? "Generando Ficha..." : "Analizar y Crear Clase"}
                    </button>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Launcher />);
    </script>
</body>
</html>
