<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math AI Launcher</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function Launcher() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('openai_api_key') || '');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);

            const processImage = async (targetPage) => {
                if (!file || !apiKey) return alert("Please add Key and Screenshot.");
                setLoading(true);
                
                try {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = async () => {
                        const base64Image = reader.result;
                        const response = await fetch("https://api.openai.com/v1/chat/completions", {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                            body: JSON.stringify({
                                model: "gpt-4o-mini",
                                messages: [{
                                    role: "user",
                                    content: [
                                        { type: "text", text: "Extract math problems. Format as JSON array of objects: {\"top\": \"143\", \"bottom\": \"256\", \"answer\": \"399\"}." },
                                        { type: "image_url", image_url: { url: base64Image } }
                                    ]
                                }],
                                response_format: { type: "json_object" }
                            })
                        });
                        const data = await response.json();
                        const content = JSON.parse(data.choices[0].message.content);
                        const problems = content.problems || Object.values(content)[0];
                        
                        // Save problems to memory and redirect
                        localStorage.setItem('openai_api_key', apiKey);
                        localStorage.setItem('current_problems', JSON.stringify(problems));
                        window.location.href = targetPage;
                    };
                } catch (e) { alert("Error: " + e.message); setLoading(false); }
            };

            return (
                <div className="max-w-xl mx-auto mt-20 p-8 bg-white rounded-3xl shadow-xl">
                    <h1 className="text-3xl font-black text-center mb-8 text-slate-800">Math Classroom AI</h1>
                    <input type="password" border className="w-full p-4 bg-slate-50 rounded-xl mb-4 border" placeholder="OpenAI Key" value={apiKey} onChange={(e) => setApiKey(e.target.value)} />
                    <input type="file" accept="image/*" onChange={(e) => setFile(e.target.files[0])} className="mb-6 block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700" />
                    
                    <div className="grid grid-cols-1 gap-4">
                        <button onClick={() => processImage('primary.html')} disabled={loading} className="p-6 bg-orange-500 text-white rounded-2xl font-bold text-xl shadow-lg">
                            {loading ? "Reading..." : "Primary Mode (Ages 4-11)"}
                        </button>
                        <button onClick={() => processImage('secondary.html')} disabled={loading} className="p-6 bg-indigo-600 text-white rounded-2xl font-bold text-xl shadow-lg">
                            {loading ? "Reading..." : "Secondary Mode (11+)"}
                        </button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Launcher />);
    </script>
</body>
</html>
