<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Launcher - El Bibliotecario</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function Launcher() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('openai_api_key') || '');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);

            const processImage = async () => {
                if (!file || !apiKey) return alert("Por favor, añade la clave API y una foto.");
                setLoading(true);
                
                try {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = async () => {
                        const base64Image = reader.result;
                        
                        // Persona: Profesor de Primaria
                        const prompt = `Eres un experto profesor de primaria en España. Analiza esta ficha y:
1. Identifica el tema (Topic).
2. Elige la plantilla (Template) adecuada:
   - 'matching': Para unir con flechas o emparejar.
   - 'column_math': Para sumas o restas verticales.
   - 'generic': Para otros tipos de texto.
3. Crea 10 problemas nuevos del mismo nivel.
Devuelve SOLO este JSON:
{
  "template": "matching", 
  "title": "Título de la lección",
  "problems": [...]
}`;

                        const response = await fetch("https://api.openai.com/v1/chat/completions", {
                            method: "POST",
                            headers: { 
                                "Content-Type": "application/json", 
                                "Authorization": `Bearer ${apiKey}` 
                            },
                            body: JSON.stringify({
                                model: "gpt-4o-mini",
                                messages: [{
                                    role: "user",
                                    content: [
                                        { type: "text", text: prompt },
                                        { type: "image_url", image_url: { url: base64Image } }
                                    ]
                                }],
                                response_format: { type: "json_object" }
                            })
                        });

                        const data = await response.json();
                        const content = JSON.parse(data.choices[0].message.content);
                        
                        // Guardar datos localmente
                        localStorage.setItem('openai_api_key', apiKey);
                        localStorage.setItem('math_type', content.template);
                        localStorage.setItem('math_title', content.title);
                        localStorage.setItem('current_problems', JSON.stringify(content.problems));
                        
                        // Navegar a la página correspondiente
                        window.location.href = content.template + '.html';
                    };
                } catch (e) {
                    alert("Error: " + e.message);
                    setLoading(false);
                }
            };

            return (
                <div className="flex items-center justify-center min-h-screen p-4">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 border-t-8 border-indigo-600">
                        <h1 className="text-3xl font-black text-center text-slate-800 mb-2">Math Launcher</h1>
                        <p className="text-center text-slate-500 mb-8">Modo Profesor</p>
                        
                        <div className="space-y-6">
                            <div>
                                <label className="block text-xs font-bold uppercase text-slate-400 mb-2 ml-1">Clave OpenAI</label>
                                <input 
                                    type="password" 
                                    className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500 transition-all"
                                    placeholder="sk-..."
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                />
                            </div>

                            <div>
                                <label className="block text-xs font-bold uppercase text-slate-400 mb-2 ml-1">Foto de la Ficha</label>
                                <input 
                                    type="file" 
                                    accept="image/*" 
                                    onChange={(e) => setFile(e.target.files[0])} 
                                    className="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:bg-indigo-50 file:text-indigo-700 file:font-bold cursor-pointer" 
                                />
                            </div>

                            <button 
                                onClick={processImage}
                                disabled={loading}
                                className={`w-full py-6 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95 ${loading ? 'bg-slate-300 text-slate-500' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
                            >
                                {loading ? "ANALIZANDO..." : "EMPEZAR CLASE"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Launcher />);
    </script>
</body>
</html>
