<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Math Classroom</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        window.GoogleGenerativeAI = GoogleGenerativeAI;
    </script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [problems, setProblems] = useState(null);
            const [view, setView] = useState('home');

            // Save key automatically when it changes
            useEffect(() => {
                if (apiKey) localStorage.setItem('gemini_api_key', apiKey);
            }, [apiKey]);

            const convertToBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = reject;
                });
            };

            const processPDF = async () => {
                if (!file || !apiKey) return alert("Please provide both an API key and a PDF.");
                if (!window.GoogleGenerativeAI) return alert("AI Library still loading... wait 2 seconds.");
                
                setLoading(true);
                try {
                    const genAI = new window.GoogleGenerativeAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                    const base64Data = await convertToBase64(file);
                    const prompt = "Act as a math teacher. Extract all problems from this PDF. Return a JSON array only. Format: [{\"id\": 1, \"question\": \"Problem text\", \"type\": \"numeric\", \"answer\": \"8\"}]. Use 'numeric' for simple answers and 'canvas' for geometry/drawing.";

                    const result = await model.generateContent([
                        prompt,
                        { inlineData: { data: base64Data, mimeType: "application/pdf" } }
                    ]);

                    const response = await result.response;
                    const text = response.text().replace(/```json|```/g, "").trim();
                    setProblems(JSON.parse(text));
                } catch (error) {
                    console.error("Error:", error);
                    alert("Analysis Failed: " + error.message);
                } finally {
                    setLoading(false);
                }
            };

            if (view === 'home') {
                return (
                    <div className="max-w-xl mx-auto mt-10 p-6 bg-white rounded-2xl shadow-xl">
                        <h1 className="text-3xl font-bold text-center text-blue-600 mb-6">Math Classroom AI</h1>
                        
                        <div className="space-y-4">
                            <div className="bg-blue-50 p-4 rounded-lg">
                                <label className="block text-xs font-bold text-blue-700 uppercase mb-1">Gemini API Key</label>
                                <input 
                                    type="password" 
                                    className="w-full p-2 border rounded" 
                                    placeholder="Paste key here..."
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                />
                            </div>
                            
                            <div className="border-2 border-dashed border-gray-300 p-10 text-center rounded-xl">
                                <input type="file" accept="application/pdf" onChange={(e) => setFile(e.target.files[0])} className="hidden" id="pdf-input" />
                                <label htmlFor="pdf-input" className="cursor-pointer text-blue-600 font-bold">
                                    {file ? `📄 ${file.name}` : "📁 Tap to upload PDF"}
                                </label>
                            </div>

                            <button 
                                onClick={processPDF}
                                disabled={loading}
                                className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-transform disabled:bg-gray-400"
                            >
                                {loading ? "AI is thinking..." : "Generate Interactive Lesson"}
                            </button>

                            {problems && (
                                <div className="grid grid-cols-2 gap-4 mt-6 animate-bounce">
                                    <button onClick={() => setView('primary')} className="p-4 bg-orange-500 text-white rounded-xl font-bold shadow-md">Ages 4-11</button>
                                    <button onClick={() => setView('secondary')} className="p-4 bg-indigo-600 text-white rounded-xl font-bold shadow-md">Ages 11+</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-3xl mx-auto p-4">
                    <button onClick={() => setView('home')} className="mb-6 font-bold text-blue-600">← Back to Upload</button>
                    <h2 className="text-xl font-bold mb-4 text-gray-700">Problems Found:</h2>
                    <div className="space-y-4">
                        {problems.map(p => (
                            <div key={p.id} className="bg-white p-5 rounded-xl shadow border-l-8 border-blue-500">
                                <p className="text-lg font-medium text-gray-800">{p.question}</p>
                                <div className="mt-4 h-32 border-2 border-dotted border-gray-200 rounded-lg flex items-center justify-center text-gray-400">
                                    Interaction Area ({p.type})
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
