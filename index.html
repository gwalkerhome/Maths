<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Classroom AI</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [problems, setProblems] = useState(null);
            const [view, setView] = useState('home');

            useEffect(() => {
                if (apiKey) localStorage.setItem('gemini_api_key', apiKey);
            }, [apiKey]);

            const convertToBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = reject;
                });
            };

            const processPDF = async () => {
                if (!file || !apiKey) return alert("Please add your Key and a PDF file.");
                setLoading(true);

                try {
                    const base64Data = await convertToBase64(file);
                    
                    // Direct Fetch Method: This is often more reliable on iPad Safari
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Extract all math problems from this PDF. Return a JSON array ONLY. Format: [{\"id\": 1, \"question\": \"Problem text\", \"type\": \"numeric\", \"answer\": \"8\"}]. No markdown." },
                                    { inline_data: { mime_type: "application/pdf", data: base64Data } }
                                ]
                            }]
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || "Connection failed");
                    }

                    const data = await response.json();
                    const text = data.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim();
                    setProblems(JSON.parse(text));
                } catch (error) {
                    console.error(error);
                    alert("Error: " + error.message);
                } finally {
                    setLoading(false);
                }
            };

            if (view === 'home') {
                return (
                    <div className="max-w-xl mx-auto mt-6 p-6 bg-white rounded-2xl shadow-xl border-t-8 border-blue-600">
                        <h1 className="text-3xl font-bold text-center text-slate-800 mb-2">Math Classroom</h1>
                        <p className="text-center text-slate-500 mb-8 font-medium text-sm">Upload a PDF to create an interactive lesson</p>
                        
                        <div className="space-y-6">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">1. Your API Key</label>
                                <input 
                                    type="password" 
                                    className="w-full p-4 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" 
                                    placeholder="Paste Gemini Key Here"
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                />
                            </div>
                            
                            <div>
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">2. Upload Lesson (PDF)</label>
                                <div className="relative border-2 border-dashed border-slate-200 p-8 text-center rounded-2xl hover:bg-slate-50 transition-colors">
                                    <input type="file" accept="application/pdf" onChange={(e) => setFile(e.target.files[0])} className="hidden" id="pdf-input" />
                                    <label htmlFor="pdf-input" className="cursor-pointer block">
                                        <span className="text-4xl mb-2 block">📄</span>
                                        <span className="text-blue-600 font-bold block">{file ? file.name : "Tap to select PDF"}</span>
                                    </label>
                                </div>
                            </div>

                            <button 
                                onClick={processPDF}
                                disabled={loading}
                                className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-blue-200 active:scale-95 transition-all disabled:bg-slate-300"
                            >
                                {loading ? "IA is Reading..." : "CREATE LESSON"}
                            </button>

                            {problems && (
                                <div className="grid grid-cols-2 gap-4 mt-4 pt-6 border-t border-slate-100">
                                    <button onClick={() => setView('primary')} className="p-5 bg-orange-500 text-white rounded-2xl font-black shadow-lg shadow-orange-100 uppercase tracking-tighter">Kids (4-11)</button>
                                    <button onClick={() => setView('secondary')} className="p-5 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100 uppercase tracking-tighter">ESO (11+)</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-3xl mx-auto p-4 pb-20">
                    <button onClick={() => setView('home')} className="mb-8 font-bold text-blue-600 flex items-center">
                        <span className="text-2xl mr-2">←</span> Back to Upload
                    </button>
                    <div className="space-y-6">
                        {problems.map(p => (
                            <div key={p.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                                <h3 className="text-xs font-bold text-slate-400 uppercase mb-3 tracking-widest">Question {p.id}</h3>
                                <p className="text-xl font-bold text-slate-800 mb-6">{p.question}</p>
                                <div className="h-40 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center">
                                    <p className="text-slate-400 font-medium italic">Workspace for {p.type} answer</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
