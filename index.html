<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Classroom AI</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [problems, setProblems] = useState(null);
            const [view, setView] = useState('home');

            useEffect(() => {
                if (apiKey) localStorage.setItem('gemini_api_key', apiKey);
            }, [apiKey]);

            const convertToBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = reject;
                });
            };

            const processPDF = async () => {
                if (!file || !apiKey) return alert("Please add your Key and a PDF file.");
                setLoading(true);

                try {
                    const base64Data = await convertToBase64(file);
                    
                    // This is the most basic, stable URL for Gemini 1.5 Flash
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Extract math problems from this PDF. Return ONLY a JSON array. Format: [{\"id\": 1, \"question\": \"Problem text\", \"type\": \"numeric\", \"answer\": \"8\"}]." },
                                    { inline_data: { mime_type: "application/pdf", data: base64Data } }
                                ]
                            }]
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || "Connection failed");
                    }

                    const data = await response.json();
                    const rawText = data.candidates[0].content.parts[0].text;
                    // Remove any markdown code blocks the AI might have added
                    const cleanJson = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                    setProblems(JSON.parse(cleanJson));
                    
                } catch (error) {
                    console.error(error);
                    alert("Error: " + error.message);
                } finally {
                    setLoading(false);
                }
            };

            if (view === 'home') {
                return (
                    <div className="max-w-xl mx-auto mt-10 p-8 bg-white rounded-3xl shadow-2xl">
                        <h1 className="text-4xl font-extrabold text-center text-blue-600 mb-4 tracking-tight">Math AI</h1>
                        <p className="text-center text-slate-400 mb-8">Upload your worksheet to begin</p>
                        
                        <div className="space-y-6">
                            <input 
                                type="password" 
                                className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all" 
                                placeholder="Gemini API Key"
                                value={apiKey}
                                onChange={(e) => setApiKey(e.target.value)}
                            />
                            
                            <label className="flex flex-col items-center justify-center border-4 border-dashed border-slate-100 p-10 rounded-3xl cursor-pointer hover:bg-slate-50 transition-all">
                                <input type="file" accept="application/pdf" onChange={(e) => setFile(e.target.files[0])} className="hidden" />
                                <span className="text-5xl mb-4">📄</span>
                                <span className="font-bold text-slate-600">{file ? file.name : "Tap to Select PDF"}</span>
                            </label>

                            <button 
                                onClick={processPDF}
                                disabled={loading}
                                className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl active:scale-95 disabled:bg-slate-200 transition-all"
                            >
                                {loading ? "Reading PDF..." : "GENERATE LESSON"}
                            </button>

                            {problems && (
                                <div className="grid grid-cols-2 gap-4 mt-4 animate-in fade-in zoom-in duration-500">
                                    <button onClick={() => setView('primary')} className="p-5 bg-orange-500 text-white rounded-2xl font-bold shadow-lg">KIDS (4-11)</button>
                                    <button onClick={() => setView('secondary')} className="p-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg">ESO (11+)</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-3xl mx-auto p-6 pb-20">
                    <button onClick={() => setView('home')} className="mb-8 font-black text-blue-600 text-lg">← RESTART</button>
                    <div className="space-y-6">
                        {problems.map((p, index) => (
                            <div key={index} className="bg-white p-8 rounded-3xl shadow-lg border-b-8 border-blue-100">
                                <h2 className="text-2xl font-bold text-slate-800 mb-4">{p.question}</h2>
                                <div className="h-32 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center italic text-slate-400">
                                    Workspace for {p.type}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
